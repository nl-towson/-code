<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>墨齋數據 — 館藏</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    fetch('tailwind.config.json').then(r=>r.json()).then(cfg=>{ tailwind.config = cfg; });
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/main.css"/>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col relative selection:bg-tertiary-fixed selection:text-tertiary">

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-40 bg-stone-50 dark:bg-zinc-900 flex justify-between items-center px-6 py-4 border-b border-zinc-200 dark:border-zinc-800 border-opacity-20 backdrop-blur-sm bg-opacity-90">
  <button class="text-zinc-800 dark:text-zinc-200 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors duration-500 rounded p-1 md:hidden">
    <span class="material-symbols-outlined">menu</span>
  </button>
  <div class="font-serif font-bold text-zinc-900 dark:text-zinc-50 tracking-widest text-lg">墨齋數據</div>
  <nav class="hidden md:flex items-center gap-8">
    <a data-nav="index.html"      class="text-zinc-500 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors duration-500 px-4 py-2 rounded" href="index.html">首頁</a>
    <a data-nav="collection.html" class="text-red-700 dark:text-red-500 font-bold px-4 py-2 rounded" href="collection.html">館藏</a>
    <a data-nav="hexagram.html"   class="text-zinc-500 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors duration-500 px-4 py-2 rounded" href="hexagram.html">卦象</a>
    <a data-nav="add.html"        class="text-zinc-500 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors duration-500 px-4 py-2 rounded" href="add.html">新增</a>
  </nav>
  <button data-open-search class="text-zinc-800 dark:text-zinc-200 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors duration-500 rounded p-1">
    <span class="material-symbols-outlined">search</span>
  </button>
</header>

<!-- Main -->
<main class="flex-grow pt-24 pb-32 md:pb-12 px-6 md:px-12 max-w-[1140px] mx-auto w-full">

  <!-- Page Header -->
  <div class="mb-16 mt-12 flex flex-col items-start">
    <span class="font-label-lg text-label-lg text-tertiary mb-4 flex items-center gap-2">
      <span class="w-1 h-4 bg-tertiary/80 inline-block rounded-sm"></span>
      藏經閣
    </span>
    <h1 class="font-headline-display text-headline-display text-primary tracking-tight">館藏目錄</h1>
    <p class="font-body-lg text-body-lg text-on-surface-variant mt-6 max-w-2xl leading-relaxed">
      靜觀萬物皆自得，四時佳興與人同。於此沉澱心智，梳理繁雜知識脈絡，構建個人智慧之庫。
    </p>
  </div>

  <!-- Category Grid — populated by JS initCollection() -->
  <div id="category-grid" class="grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
    <!-- Loading skeleton -->
    <div class="md:col-span-12 flex items-center justify-center py-20 text-secondary text-label-lg">載入中…</div>
  </div>
</main>

<!-- Bottom Nav (mobile) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-stone-50 dark:bg-zinc-900 border-t border-zinc-200 border-opacity-10 backdrop-blur-md bg-opacity-95">
  <a data-nav="index.html"      href="index.html"      class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-900 transition-all duration-300 gap-1"><span class="material-symbols-outlined mb-1">home</span><span class="font-serif text-xs font-medium">首頁</span></a>
  <a data-nav="collection.html" href="collection.html" class="flex flex-col items-center justify-center text-red-700 scale-110 relative gap-1"><span class="material-symbols-outlined mb-1" style="font-variation-settings:'FILL' 1">library_books</span><span class="font-serif text-xs font-medium font-bold">館藏</span></a>
  <a data-nav="hexagram.html"   href="hexagram.html"   class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-900 transition-all duration-300 gap-1"><span class="material-symbols-outlined mb-1">auto_awesome</span><span class="font-serif text-xs font-medium">卦象</span></a>
  <a data-nav="add.html"        href="add.html"        class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-900 transition-all duration-300 gap-1"><span class="material-symbols-outlined mb-1">add_circle</span><span class="font-serif text-xs font-medium">新增</span></a>
</nav>

<!-- Search Overlay -->
<div id="search-overlay" role="dialog" aria-modal="true" aria-label="搜尋">
  <button data-close-search class="absolute top-6 right-6 text-[#747878] hover:text-[#171818] transition-colors">
    <span class="material-symbols-outlined text-3xl">close</span>
  </button>
  <input type="search" placeholder="搜尋卷宗、筆記或卦象..."/>
  <div id="search-results"></div>
</div>

<div id="toast"></div>
<script src="js/app.js"></script>
</body>
</html>
